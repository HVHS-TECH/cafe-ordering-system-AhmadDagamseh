<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div class="product-page">
    <img id="productImg" src="" alt="">
    <h1 id="productName"></h1>
    <h2 id="productPrice"></h2>

    <button id="addBtn">Add to Cart</button>
</div>

<script>
    <script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");
  const price = params.get("price");
  const img = params.get("img");

  document.getElementById("productImg").src = img || "";
  document.getElementById("productName").innerText = name || "";
  document.getElementById("productPrice").innerText = "$" + (price || "0");

  const addBtn = document.getElementById("addBtn");
  addBtn.setAttribute("data-name", name);
  addBtn.setAttribute("data-price", price);
  addBtn.setAttribute("data-img", img);

  addBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();

    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const item = {
      name: name || "Item",
      price: Number(price) || 0,
      img: img || "",
      qty: 1
    };

    // merge
    const existing = cart.find(c => c.name === item.name && Number(c.price) === Number(item.price));
    if (existing) existing.qty = Number(existing.qty || 0) + 1;
    else cart.push(item);

    localStorage.setItem("cart", JSON.stringify(cart));
    // update badge if present
    const cartCount = document.getElementById("cartCount");
    if (cartCount) {
      const totalItems = cart.reduce((s, it) => s + Number(it.qty || 0), 0);
      cartCount.innerText = totalItems;
    }
    alert("Added to cart");
  });
</script>

</script>

</body>
</html>
